<svg viewBox="0 0 960 820" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif" font-size="13">
  <title>TokenOpt Architecture — Single-MCP with optional CodeGraph bridge</title>
  <desc>Architecture diagram showing how TokenOpt routes natural user prompts through a single MCP with an optional internal CodeGraph bridge, producing a merged evidence packet with minimal token cost.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#333"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#e05252"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#3aaa6a"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#4a80c4"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#c87020"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#7050c0"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="820" fill="#ffffff" rx="12"/>

  <!-- Band separators -->
  <rect x="0" y="56" width="960" height="1" fill="#e0e0e0"/>
  <rect x="0" y="168" width="960" height="1" fill="#e0e0e0"/>
  <rect x="0" y="330" width="960" height="1" fill="#e0e0e0"/>
  <rect x="0" y="560" width="960" height="1" fill="#e0e0e0"/>
  <rect x="0" y="680" width="960" height="1" fill="#e0e0e0"/>
  <rect x="0" y="754" width="960" height="1" fill="#e0e0e0"/>

  <!-- Band fills -->
  <rect x="0" y="57" width="960" height="111" fill="#f8f8f8"/>
  <rect x="0" y="169" width="960" height="161" fill="#fff"/>
  <rect x="0" y="331" width="960" height="229" fill="#f0f4ff"/>
  <rect x="0" y="561" width="960" height="119" fill="#fff"/>
  <rect x="0" y="681" width="960" height="73" fill="#f8f8f8"/>
  <rect x="0" y="755" width="960" height="65" fill="#fff8ee"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#111">TokenOpt — Architecture &amp; Flow</text>
  <text x="480" y="49" text-anchor="middle" font-size="11" fill="#666">Single-MCP setup · optional internal CodeGraph bridge · policy coordination</text>

  <!-- Row labels -->
  <text x="14" y="77" font-size="10" font-weight="700" fill="#999">USER</text>
  <text x="14" y="192" font-size="10" font-weight="700" fill="#999">AGENT</text>
  <text x="14" y="354" font-size="10" font-weight="700" fill="#999">TOKENOPT MCP</text>
  <text x="14" y="584" font-size="10" font-weight="700" fill="#999">EVIDENCE</text>
  <text x="14" y="704" font-size="10" font-weight="700" fill="#999">OUTPUT</text>
  <text x="14" y="778" font-size="10" font-weight="700" fill="#999">POLICY</text>

  <!-- ── ROW 1: USER ── -->
  <rect x="330" y="66" width="300" height="52" rx="8" fill="#ddeaff" stroke="#4a80c4" stroke-width="1.5"/>
  <text x="480" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#2a5fa0">User types a natural prompt</text>
  <text x="480" y="105" text-anchor="middle" font-size="11" fill="#444">"Investigate PBI-42 and create a plan"</text>

  <!-- ── ROW 2: AGENT ── -->
  <line x1="480" y1="118" x2="480" y2="175" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="176" width="800" height="140" rx="8" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="160" y="198" font-size="11" font-weight="700" fill="#888">Agent (Codex / Copilot) — guided by SERVER_INSTRUCTIONS / AGENTS.md / copilot-instructions.md</text>

  <!-- Decision diamond -->
  <polygon points="480,214 530,244 480,274 430,244" fill="#fff9e6" stroke="#e0a020" stroke-width="1.5"/>
  <text x="480" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#b07010">Broad task?</text>
  <text x="480" y="254" text-anchor="middle" font-size="10" fill="#b07010">Unknown owner?</text>

  <!-- YES arrow down to TokenOpt -->
  <line x1="480" y1="274" x2="480" y2="336" stroke="#3aaa6a" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <text x="500" y="308" font-size="10" fill="#3aaa6a" font-weight="600">YES → call MCP first</text>

  <!-- NO arrow right -->
  <line x1="530" y1="244" x2="736" y2="244" stroke="#e05252" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="634" y="236" text-anchor="middle" font-size="10" fill="#e05252" font-weight="600">NO (exact file / symbol known)</text>
  <rect x="738" y="228" width="120" height="34" rx="6" fill="#ffeaea" stroke="#e05252" stroke-width="1.2"/>
  <text x="798" y="242" text-anchor="middle" font-size="11" fill="#e05252" font-weight="600">Direct read /</text>
  <text x="798" y="256" text-anchor="middle" font-size="11" fill="#e05252" font-weight="600">search only</text>

  <!-- ── ROW 3: TOKENOPT MCP (with internal bridge) ── -->

  <!-- Outer TokenOpt box -->
  <rect x="80" y="340" width="620" height="208" rx="10" fill="#edf4ff" stroke="#4a80c4" stroke-width="2"/>
  <text x="390" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#2a5fa0">TokenOpt MCP — contextgate_get_context</text>
  <line x1="96" y1="368" x2="684" y2="368" stroke="#4a80c4" stroke-width="0.8" opacity="0.4"/>

  <!-- Step 1: Inventory -->
  <rect x="98" y="376" width="148" height="60" rx="6" fill="#fff" stroke="#4a80c4" stroke-width="1"/>
  <text x="172" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5fa0">① Scan repo</text>
  <text x="172" y="410" text-anchor="middle" font-size="10" fill="#444">git ls-files + manifest</text>
  <text x="172" y="424" text-anchor="middle" font-size="10" fill="#444">inventory · build facts</text>

  <line x1="246" y1="406" x2="264" y2="406" stroke="#4a80c4" stroke-width="1.3" marker-end="url(#arr-blue)"/>

  <!-- Step 2: Route -->
  <rect x="266" y="376" width="148" height="60" rx="6" fill="#fff" stroke="#4a80c4" stroke-width="1"/>
  <text x="340" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5fa0">② Route task</text>
  <text x="340" y="410" text-anchor="middle" font-size="10" fill="#444">router.ts classifies</text>
  <text x="340" y="424" text-anchor="middle" font-size="10" fill="#444">implement · review · debug…</text>

  <line x1="414" y1="406" x2="432" y2="406" stroke="#4a80c4" stroke-width="1.3" marker-end="url(#arr-blue)"/>

  <!-- Step 3: Compile packet -->
  <rect x="434" y="376" width="148" height="60" rx="6" fill="#fff" stroke="#4a80c4" stroke-width="1"/>
  <text x="508" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5fa0">③ Compile packet</text>
  <text x="508" y="410" text-anchor="middle" font-size="10" fill="#444">evidence · missing[] ·</text>
  <text x="508" y="424" text-anchor="middle" font-size="10" fill="#444">allowed_followups</text>

  <!-- Internal CodeGraph bridge box -->
  <rect x="96" y="450" width="590" height="88" rx="8" fill="#f0faf3" stroke="#3aaa6a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="391" y="468" text-anchor="middle" font-size="11" font-weight="700" fill="#1a7a40">④ Internal CodeGraph bridge (when codegraph.enabled = true)</text>
  <line x1="110" y1="474" x2="672" y2="474" stroke="#3aaa6a" stroke-width="0.8" opacity="0.4"/>

  <!-- Bridge flow inside -->
  <text x="200" y="492" text-anchor="middle" font-size="10" fill="#333">packet has</text>
  <text x="200" y="506" text-anchor="middle" font-size="10" fill="#1a7a40">code_graph gap?</text>
  <line x1="240" y1="498" x2="268" y2="498" stroke="#3aaa6a" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <text x="200" y="522" text-anchor="middle" font-size="9" fill="#888" font-style="italic">subprocess via MCP client SDK</text>

  <text x="342" y="490" text-anchor="middle" font-size="10" fill="#1a7a40" font-weight="600">YES → spawn codegraph</text>
  <text x="342" y="504" text-anchor="middle" font-size="10" fill="#333">call codegraph_context(task)</text>
  <text x="342" y="518" text-anchor="middle" font-size="9" fill="#888" font-style="italic">SQLite call graph · flow steps · slices</text>
  <line x1="412" y1="498" x2="440" y2="498" stroke="#3aaa6a" stroke-width="1.2" marker-end="url(#arr-green)"/>

  <text x="536" y="490" text-anchor="middle" font-size="10" fill="#1a7a40" font-weight="600">fold into packet</text>
  <text x="536" y="504" text-anchor="middle" font-size="10" fill="#333">merge slices · remove gap</text>
  <text x="536" y="518" text-anchor="middle" font-size="9" fill="#888" font-style="italic">model sees 1 tool call only</text>

  <!-- Arrow from step 3 down to bridge -->
  <line x1="508" y1="436" x2="508" y2="450" stroke="#3aaa6a" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>

  <!-- Stats line -->
  <text x="391" y="553" text-anchor="middle" font-size="10" fill="#4a80c4" font-style="italic">⑤ append savings line · write ~/.tokenopt/stats/YYYY-MM-DD.jsonl</text>

  <!-- ── ROW 4: EVIDENCE ── -->
  <line x1="390" y1="548" x2="390" y2="568" stroke="#4a80c4" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="80" y="572" width="800" height="80" rx="8" fill="#fffdf0" stroke="#e0a020" stroke-width="1.8"/>
  <text x="480" y="592" text-anchor="middle" font-size="13" font-weight="700" fill="#8a6000">Combined Evidence Packet</text>
  <text x="220" y="610" text-anchor="middle" font-size="11" fill="#333">answerable · confidence · coverage</text>
  <text x="220" y="626" text-anchor="middle" font-size="11" fill="#333">evidence[] · answer_contract</text>
  <line x1="340" y1="579" x2="340" y2="644" stroke="#e0a020" stroke-width="0.8" opacity="0.4"/>
  <text x="480" y="610" text-anchor="middle" font-size="11" fill="#333">missing[] · allowed_followups</text>
  <text x="480" y="626" text-anchor="middle" font-size="11" fill="#333">tool_categories · next_action</text>
  <line x1="620" y1="579" x2="620" y2="644" stroke="#e0a020" stroke-width="0.8" opacity="0.4"/>
  <text x="760" y="610" text-anchor="middle" font-size="11" fill="#333">codeGraphEnrichment: flowSteps</text>
  <text x="760" y="626" text-anchor="middle" font-size="10" fill="#3aaa6a" font-style="italic">merged by bridge (if enabled)</text>

  <!-- ── ROW 5: OUTPUT ── -->
  <line x1="480" y1="652" x2="480" y2="687" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="690" width="500" height="56" rx="8" fill="#f3fff7" stroke="#3aaa6a" stroke-width="1.8"/>
  <text x="480" y="712" text-anchor="middle" font-size="13" font-weight="700" fill="#1a7a40">Agent answer (from combined packet)</text>
  <text x="480" y="730" text-anchor="middle" font-size="11" fill="#555">1 tool call · no redundant grep / shell · no dual-MCP token waste</text>

  <!-- ── ROW 6: POLICY ── -->
  <!-- Policy hooks box -->
  <rect x="80" y="762" width="800" height="48" rx="8" fill="#fff3e0" stroke="#c87020" stroke-width="1.5"/>
  <text x="240" y="782" text-anchor="middle" font-size="11" font-weight="700" fill="#c87020">Policy gates (hooks)</text>
  <line x1="340" y1="764" x2="340" y2="806" stroke="#c87020" stroke-width="0.8" opacity="0.4"/>
  <text x="480" y="779" text-anchor="middle" font-size="10" fill="#555">block: codegraph_context before ContextGate · broad search after answerable packet</text>
  <text x="480" y="795" text-anchor="middle" font-size="10" fill="#555">compress: noisy tool output · deny: lockfiles / generated files / secrets</text>
  <line x1="620" y1="764" x2="620" y2="806" stroke="#c87020" stroke-width="0.8" opacity="0.4"/>
  <text x="760" y="782" text-anchor="middle" font-size="10" fill="#c87020" font-weight="600">user-prompt-submit</text>
  <text x="760" y="796" text-anchor="middle" font-size="10" fill="#c87020">pre/post-tool-use · agent-stop</text>

  <!-- Legend -->
  <rect x="718" y="344" width="10" height="10" rx="2" fill="#4a80c4"/>
  <text x="732" y="353" font-size="10" fill="#4a80c4">TokenOpt flow</text>
  <rect x="718" y="360" width="10" height="10" rx="2" fill="#3aaa6a"/>
  <text x="732" y="369" font-size="10" fill="#3aaa6a">Internal bridge (optional)</text>
  <rect x="718" y="376" width="10" height="10" rx="2" fill="#e05252"/>
  <text x="732" y="385" font-size="10" fill="#e05252">Bypass (exact target)</text>
  <rect x="718" y="392" width="10" height="10" rx="2" fill="#c87020"/>
  <text x="732" y="401" font-size="10" fill="#c87020">Policy enforcement</text>
</svg>
